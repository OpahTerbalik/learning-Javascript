<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5c exercise</title>
</head>
<body>

    <script>

        const name = "adam";
        console.log(`my name is : ${name}`);
        
        let coffee = 5;
        let bagel = 3 * 2;
        let soup = 9;

        let items = coffee + bagel + soup;
        let tax = items * 0.1;
        let totalCost = items + tax;

        console.log(`items is $ ${items}`);
        console.log(`tax is $ ${tax}`);
        console.log(`total cost is $ ${totalCost.toFixed(2)}`);
    </script>
</body>
</html>
