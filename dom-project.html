<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Project</title>
</head>
<body>
    <h1>DOM Projects</h1>
    <h2>Youtube Subscribe Button</h2>
    <button onclick="subsButton();" class="subs-button">Subscribe</button>

    <p>rock paper scissors game</p>
    <a href="rock-paper-scissor-update2.html">Click Here</a>

    <p>Amazon Shipping Calculator</p>
    <p>order under $40 -  +$10 Shipping</p>
    <p>oredr over $40 - Free Shipping</p>
    <input onkeydown="pressEnter(event);" class="costInput" placeholder="Cost of order">
    <button onclick="costOrder();">Calculate</button>
    <p class="totalCost"></p>

    <button onclick="chooseResult('head');" class="button1">head</button>
    <button onclick="chooseResult('tail');" class="button2">tail</button>
    <p class="choose-state"></p>

    <input onkeydown="pressEnter(event)" class="input-Name" type="text" placeholder="Your Name">
    <button onclick="submitName();" class="submit-Button">Submit</button>
    <p class="result-Name"></p>

    <script>

        function submitName () {

            const inputName = document.querySelector('.input-Name');
            let resultName = inputName.value;
            document.querySelector('.result-Name').innerText = `Your Name is : ${resultName}`

        }

        function chooseResult(picked) {
            document.querySelector('.choose-state');

            
        }



        function pressEnter(event) {
            if (event.key === 'Enter') {
                costOrder();
                submitName();
            }
        }

        function costOrder() {

            const inputElement = document.querySelector('.costInput');

            let cost = Number(inputElement.value);

            if (cost < 40) {
                cost = cost + 10;
            }
            
            document.querySelector('.totalCost').innerHTML = `Total cost : RM${cost}`;
        
        }


        function subsButton () {
            const buttonElement = document.querySelector('.subs-button');

            if (buttonElement.innerHTML === 'Subscribe') {
                console.log(buttonElement.innerHTML = 'Subscribed');
            } else {
                console.log(buttonElement.innerHTML = 'Subscribe');
            }
        }

        
    </script>
</body>
</html>
