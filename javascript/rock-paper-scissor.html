<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissors</title>
</head>
<body>
    <h2>Rock Paper Scissors</h2>
    <button onclick="playGame('Rock');">Rock</button>

    <button onclick="playGame('Paper');">Paper</button>

    <button onclick=" playGame('Scissors')">Scissors</button>

    <p><a href="#">click here</a> to see the final of the project</p>

    <script>
        function playGame(playerMove) {
            const aiMove = pickAiMove();
            let result = '';

                if (playerMove === 'Scissors') { /* scissors */
                if (aiMove === 'Rock') {
                    result = 'you lose';
                } else if (aiMove === 'paper') {
                    result = 'you win !';
                } else if (aiMove === 'Scissors') {
                    result = 'tie.';
                }
                } else if (playerMove === 'Paper') {/* paper */
                if (aiMove === 'Rock') {
                    result = 'you win !';
                } else if (aiMove === 'paper') {
                    result = 'tie.';
                } else if (aiMove === 'Scissors') {
                    result = 'you lose';
                }
                } else if (playerMove === 'Rock') {/*Rock*/
                if (aiMove === 'Rock') {
                    result = 'tie.';
                } else if (aiMove === 'paper') {
                    result = 'You Lose';
                } else if (aiMove === 'Scissors') {
                    result = 'you win !';
                }
            }
                alert(`You picked ${playerMove}. AI picked ${aiMove} | ${result}`);
        }

        function pickAiMove () {
            const randomNumber = (Math.random());

            let aiMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                aiMove = 'rock';

            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                aiMove = 'paper';

            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                aiMove = 'Scissors';

            }
            return aiMove;
        }

    </script>
</body>
</html>
