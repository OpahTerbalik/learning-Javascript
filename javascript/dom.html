<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
<button>1st button</button>
<button class="js-button">2nd button</button>

    <script>


        //will target a specific elemet inside .HTML the name of HTML element but it will target only the first HTML elemnt not 2nd not 3rd
        document.querySelector('button').innerHTML = 'adam';
        //will target a specific element inside .HTML using (class) attribute same as .css
        document.querySelector('.js-button').innerHTML = 'adam2'

        /* document.body.innerHTML = 'STFU' */
    </script>
</body>
</html>
