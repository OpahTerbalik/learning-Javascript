<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
    <title>Counter</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body{
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Roboto", sans-serif;
        }

        .counter-container {
            background-image:linear-gradient(90deg,rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 1) 50%, rgba(252, 176, 69, 1) 100%) ;
            font-size: 3rem;
            text-align: center;
            border: 1px solid white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow:  1px 2px 29px 4px rgba(0,0,0,0.47);
        }

        .counter-btn {
            padding: 15px 30px;
            border-radius: 25px;
            border: 1px solid white;
            background-color: transparent;
            cursor: pointer;
            color: white;
            transition: 0.15s;
        }

        .counter-btn:hover {
            transform: scale(1.1);
        }

        .counter-btn:active {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <p>Mini Counter</p>
        <h1 id="show-cntr" class="show-counter">0</h1>
        <button id="minus-btn" class="counter-btn">-</button>
        <button id="reset-btn" class="counter-btn">Reset ↻</button>
        <button id="plus-btn" class="counter-btn">+</button>
    </div>
    

    <script>
        let showCounter = 0;

        const showElement = document.getElementById('show-cntr');
        const addBtnElement = document.getElementById('plus-btn');
        const minusBtnElement = document.getElementById('minus-btn');
        const resetBtnElement = document.getElementById('reset-btn');

        minusBtnElement.addEventListener('click', minusButton);
        addBtnElement.addEventListener('click', addButton);
        resetBtnElement.addEventListener('click', resetButton);

        function showdisplay() {
            showElement.innerHTML = showCounter;
        }

        function minusButton() {
            showCounter--
            
            if (showCounter < 10) {
                alert('no items !!!');
                showCounter = 0;
            }
            showdisplay();
        }

        function resetButton() {
            showCounter = 0
            showdisplay();

        }

        function addButton() {
            showCounter++

            if(showCounter > 10) {
                alert('exceed limit !!!');
                showCounter = 10;
            }

            showdisplay();
        }
    </script>
</body>
</html>
