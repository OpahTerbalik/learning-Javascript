<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissors</title>
</head>
<body>
    <h2>Rock Paper Scissors</h2>
    <button onclick="playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick=" playGame('scissors')">Scissors</button>
    
    <p class="result-state"></p>
    
    <p class="choose-state"></p>

    <p class="score-label"></p>

    <button onclick="scoreReset();">Reset Score</button>

    <p><a href="#">click here</a> to see the final of the project</p>

    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {wins: 0, loses: 0, ties: 0};
        console.log(score);

        scoreState();

        /* if (!score) {
            score = {
                wins : 0,
                loses : 0,
                ties : 0
            };
        } */

        function playGame(playerMove) {
            const aiMove = pickAiMove();
            let result = '';

                if (playerMove === 'scissors') { /* scissors */
                if (aiMove === 'rock') {
                    result = 'you lose';
                } else if (aiMove === 'paper') {
                    result = 'you win !';
                } else if (aiMove === 'scissors') {
                    result = 'tie.';
                }
                } else if (playerMove === 'paper') {/* paper */
                if (aiMove === 'rock') {
                    result = 'you win !';
                } else if (aiMove === 'paper') {
                    result = 'tie.';
                } else if (aiMove === 'scissors') {
                    result = 'you lose';
                }
                } else if (playerMove === 'rock') {/*Rock*/
                if (aiMove === 'rock') {
                    result = 'tie.';
                } else if (aiMove === 'paper') {
                    result = 'you lose';
                } else if (aiMove === 'scissors') {
                    result = 'you win !';
                }
            }

                if(result === 'you win !') {
                    score.wins++
                } else if (result === 'you lose') {
                    score.loses++
                } else if (result === 'tie.') {
                    score.ties++
                }

                localStorage.setItem('score', JSON.stringify(score));

                scoreState();
    
                document.querySelector('.result-state').innerHTML = `${result}`
                document.querySelector('.choose-state').innerHTML = `you picked : ${playerMove} | AI picked : ${aiMove}`;
        }


        function scoreState () {
            document.querySelector('.score-label').innerHTML = `
                wins: ${score.wins} Loses: ${score.loses} Ties: ${score.ties}`;
        }
        

        function pickAiMove () {
            const randomNumber = (Math.random());

            let aiMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                aiMove = 'rock';

            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                aiMove = 'paper';

            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                aiMove = 'scissors';

            }
            return aiMove;
        }

        function scoreReset () {
            score.wins = 0;
            score.loses = 0;
            score.ties = 0;
            localStorage.removeItem('resetScore');

            scoreState(); 
        }

    </script>
</body>
</html>
